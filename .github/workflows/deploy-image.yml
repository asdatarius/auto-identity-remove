name: build-and-push image

# Builds the NAS/Portainer multi-arch image (deploy/Dockerfile) and pushes it to
# Docker Hub. Runs on every push to main, on a manual button, and weekly (so the
# Playwright base image picks up upstream security patches even with no code change).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  e.g. asdatarius
#   DOCKERHUB_TOKEN     a Docker Hub access token with Read/Write (NOT your password)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC — base-image refresh (remove if you don't want weekly rebuilds)

concurrency:
  group: build-and-push
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3        # arm64 emulation for multi-arch
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/auto-identity-remove
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keep the Docker Hub page in sync with deploy/DOCKERHUB.md — no more
      # hand-pasting the description after each change.
      - name: Sync Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/auto-identity-remove
          short-description: "Data-broker opt-out runner for NAS/Portainer — scheduled, multi-arch, family-ready"
          readme-filepath: deploy/DOCKERHUB.md
